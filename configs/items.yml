      - OOO
      ingredients:
        B: BLACK_DYE
        W: WHITE_DYE
        O: OAK_SLAB
      result:
        item: board_games:checkers
        amount: 1
items:
  tic_tac_toe:
    display_name: display-name-tic_tac_toe
    permission: board_games.game.tic_tac_toe
    specific_properties:
      leather_horse_armor:
        color: 10248253
    resource:
      material: LEATHER_HORSE_ARMOR
      generate: false
      model_path: item/tic_tac_toe
    behaviours:
      furniture:
        solid: false
        entity: item_display
        fixed_rotation: true
        placeable_on:
          floor: true
          ceiling: false
          walls: false
        hitbox:
          height: 1
        sound:
          place:
            name: block.wood.place
          break:
            name: block.wood.break
    events_settings:
      cooldown:
        indicator: HIDDEN
        ticks: 1
    events:
      placed_furniture:
        interact:
          script:
            name: tic_tac_toe
        break:
          script:
            name: tic_tac_toe
