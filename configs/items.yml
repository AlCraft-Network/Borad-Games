info:
  namespace: board_games
recipes:
  crafting_table:
    tic_tac_toe:
      permission: board_games.game.tic_tac_toe
      enabled: true
      pattern:
      - XXX
      - BWB
      - OOO
      ingredients:
        B: BROWN_DYE
        W: WHITE_DYE
        O: OAK_SLAB
      result:
        item: board_games:tic_tac_toe
        amount: 1
    chess:
      permission: board_games.game.chess
      enabled: true
      pattern:
